apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mcp-server-template-cert
  namespace: istio-system
  labels:
    use-istio-ingress: "true"
    use-dns01-challenge: "true"
spec:
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt
  secretName: mcp-server-template-cert
  commonName: $(MCP_SERVER_HOST)
  dnsNames:
    - $(MCP_SERVER_HOST)
